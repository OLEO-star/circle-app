<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>リングデザイン案（実データ・2026-06-13）</title>
<style>
  body { font-family: -apple-system, "Hiragino Kaku Gothic ProN", sans-serif; background:#fff; color:#1a1a1a; margin:0; padding:24px; }
  h1 { font-size:18px; }
  .grid { display:grid; grid-template-columns:repeat(2,1fr); gap:28px; max-width:880px; }
  .card { border:1px solid #eee; border-radius:16px; padding:18px; }
  .card h2 { font-size:15px; margin:0 0 2px; }
  .card .sub { font-size:11px; color:#888; margin:0 0 10px; }
  canvas { display:block; margin:0 auto; }
  .legend { font-size:11px; color:#666; margin-top:8px; line-height:1.5; }
  .note { font-size:11px; color:#aaa; max-width:880px; margin-top:18px; }
</style>
</head>
<body>
<h1>リングデザイン案 — 実データ（化学科 理想受験生・判定式v2）</h1>
<div class="grid" id="grid"></div>
<p class="note" id="note"></p>
<script>
// ===== 実データ（/tmp/ring_data.json から埋め込み） =====
const DATA = __DATA__;
const SCI_COLORS = ["#1E40AF","#00C9D7","#1FCB9E","#2EAF6A","#A8D820","#B2A0E5","#6F3EBF","#0B1D5C"];
const SCI_NAMES  = ["数理・情報","工学","物理・地球","化学","生物","生命・医療","農・獣医","身体運動"];

const sci = DATA.profiles.find(p => p.label === "化学科 理想");      // 20学科(sciences)
const mix = DATA.profiles.find(p => p.label.includes("mixed・32")); // 32学科(mixed)

// ---- 色ユーティリティ ----
function hexToRgb(h){return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function lerpRgb(a,b,t){return `rgb(${a.map((v,i)=>Math.round(v+(b[i]-v)*t)).join(",")})`;}

// ---- 共通: min-max 正規化（現行 Ring.tsx と同じ：最弱0.05・最強1.0）----
function normalize(vals){
  const mn=Math.min(...vals), mx=Math.max(...vals), r=(mx-mn)||1;
  return vals.map(v=>0.05+((v-mn)/r)*0.95);
}

function mkCard(title, sub, legend){
  const d=document.createElement("div"); d.className="card";
  d.innerHTML=`<h2>${title}</h2><p class="sub">${sub}</p>`;
  const c=document.createElement("canvas"); c.width=620; c.height=620; c.style.width="310px"; c.style.height="310px";
  d.appendChild(c);
  const lg=document.createElement("p"); lg.className="legend"; lg.innerHTML=legend; d.appendChild(lg);
  document.getElementById("grid").appendChild(d);
  const ctx=c.getContext("2d"); ctx.scale(2,2);
  return ctx;
}
const SZ=310, CX=155, CY=155;

// ============================================================
// 案A（現行）: 8カテゴリ集約・8山谷
// ============================================================
function drawCurrent(ctx, cats, colors){
  const inner=SZ*0.16, outer=SZ*0.34, minLen=SZ*0.02;
  const ns=normalize(cats);
  const rgbs=colors.map(hexToRgb);
  const LINES=120, segA=360/8;
  for(let i=0;i<LINES;i++){
    const ang=(i/LINES)*360;
    const rad=((ang-90-45)*Math.PI)/180;
    const pos=ang/segA, ci=Math.floor(pos)%8, ni=(ci+1)%8, f=pos-Math.floor(pos);
    // 色補間
    let col;
    const bz=0.2;
    if(f<bz){const pc=(ci-1+8)%8; col=lerpRgb(rgbs[pc],rgbs[ci],0.5+(f/bz)*0.5);}
    else if(f>1-bz){col=lerpRgb(rgbs[ci],rgbs[ni],((f-(1-bz))/bz)*0.5);}
    else col=`rgb(${rgbs[ci].join(",")})`;
    // 長さ補間
    let s;
    if(f<0.5){const pc=(ci-1+8)%8,t=f+0.5; s=ns[pc]+(ns[ci]-ns[pc])*t;}
    else{const t=f-0.5; s=ns[ci]+(ns[ni]-ns[ci])*t;}
    const len=minLen+s*(outer-inner-minLen), oR=inner+len;
    ctx.beginPath();
    ctx.moveTo(CX+inner*Math.cos(rad),CY+inner*Math.sin(rad));
    ctx.lineTo(CX+oR*Math.cos(rad),CY+oR*Math.sin(rad));
    ctx.strokeStyle=col; ctx.lineWidth=2; ctx.lineCap="round"; ctx.stroke();
  }
  drawLabels(ctx, outer);
}

function drawLabels(ctx, outer){
  ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.font="bold 11px sans-serif"; ctx.fillStyle="#999";
  for(let i=0;i<8;i++){
    const ang=i*45+22.5, rad=((ang-90-45)*Math.PI)/180, lr=outer+SZ*0.085;
    ctx.fillText(SCI_NAMES[i], CX+lr*Math.cos(rad), CY+lr*Math.sin(rad));
  }
}

// ============================================================
// 案B（細分化）: 学科ごとに1本の太線・各学科の適合度＝山谷
//   カテゴリ内は適合度降順でなくslot固定順。色はカテゴリ色。
//   sciences=20本 → 20山谷 / mixed=32本 → 32山谷
// ============================================================
function drawPerDept(ctx, prof, colors, names, slotCount){
  const inner=SZ*0.16, outer=SZ*0.34, minLen=SZ*0.02;
  const rgbs=colors.map(hexToRgb);
  // slot順 → 各slot内はslot内で安定整列（元配列順）
  const depts=prof.perDept.slice().sort((a,b)=> a.slot-b.slot);
  const ns=normalize(depts.map(d=>d.sim));
  const N=depts.length, segA=360/N;
  for(let i=0;i<N;i++){
    const ang=(i+0.5)/N*360;
    const rad=((ang-90-45)*Math.PI)/180;
    const col=`rgb(${rgbs[depts[i].slot].join(",")})`;
    const len=minLen+ns[i]*(outer-inner-minLen), oR=inner+len;
    ctx.beginPath();
    ctx.moveTo(CX+inner*Math.cos(rad),CY+inner*Math.sin(rad));
    ctx.lineTo(CX+oR*Math.cos(rad),CY+oR*Math.sin(rad));
    ctx.strokeStyle=col; ctx.lineWidth=5; ctx.lineCap="round"; ctx.stroke();
  }
  // 8カテゴリの色帯ラベルは維持
  drawLabels(ctx, outer);
}

// ============================================================
// 案C（タコメーター/加速度計型）: 270°ゲージ。針=top1適合度。
//   目盛=8カテゴリ。レッドゾーン風に高適合を強調。
// ============================================================
function drawTacho(ctx, prof, colors){
  const cx=CX, cy=CY+24, R=110, start=135, sweep=270; // 7時半→4時半
  const top1=prof.perDept.reduce((a,b)=>b.sim>a.sim?b:a);
  // 背景アーク（カテゴリ色のグラデ目盛）
  for(let k=0;k<60;k++){
    const a0=start+(k/60)*sweep, a1=start+((k+1)/60)*sweep;
    const ci=Math.floor((k/60)*8)%8;
    ctx.beginPath();
    ctx.arc(cx,cy,R,a0*Math.PI/180,a1*Math.PI/180);
    ctx.strokeStyle=`rgb(${hexToRgb(colors[ci]).join(",")})`;
    ctx.lineWidth=10; ctx.stroke();
  }
  // 目盛り線
  for(let i=0;i<=8;i++){
    const a=(start+(i/8)*sweep)*Math.PI/180;
    ctx.beginPath();
    ctx.moveTo(cx+(R-9)*Math.cos(a),cy+(R-9)*Math.sin(a));
    ctx.lineTo(cx+(R+9)*Math.cos(a),cy+(R+9)*Math.sin(a));
    ctx.strokeStyle="#ccc"; ctx.lineWidth=1.5; ctx.stroke();
  }
  // 針：top1のスロット方向に振る
  const slotFrac=(top1.slot+0.5)/8;
  const na=(start+slotFrac*sweep)*Math.PI/180;
  ctx.beginPath();
  ctx.moveTo(cx,cy);
  ctx.lineTo(cx+(R-14)*Math.cos(na),cy+(R-14)*Math.sin(na));
  ctx.strokeStyle="#1a1a1a"; ctx.lineWidth=3; ctx.lineCap="round"; ctx.stroke();
  ctx.beginPath(); ctx.arc(cx,cy,7,0,2*Math.PI); ctx.fillStyle="#1a1a1a"; ctx.fill();
  // 中央に適合度（タコメーター中央の数字風）
  ctx.textAlign="center"; ctx.fillStyle="#1a1a1a";
  ctx.font="bold 30px sans-serif"; ctx.fillText(top1.score, cx, cy-28);
  ctx.font="12px sans-serif"; ctx.fillStyle="#888"; ctx.fillText(top1.name, cx, cy-50);
  ctx.font="10px sans-serif"; ctx.fillStyle="#aaa"; ctx.fillText("適合度", cx, cy-12);
}

// ============================================================
// 案D（パラメータ表示）: 上位8学科を水平バーで。RPG ステータス風。
// ============================================================
function drawParams(ctx, prof, colors){
  const top=prof.perDept.slice().sort((a,b)=>b.sim-a.sim).slice(0,8);
  const x0=30, w=250, h=20, gap=14, y0=14;
  ctx.textAlign="left"; ctx.textBaseline="middle";
  top.forEach((d,i)=>{
    const y=y0+i*(h+gap)+h/2;
    // トラック
    ctx.fillStyle="#f0f0f0"; ctx.fillRect(x0,y-7,w,14);
    // バー
    ctx.fillStyle=`rgb(${hexToRgb(colors[d.slot]).join(",")})`;
    ctx.fillRect(x0,y-7,w*d.sim,14);
    // ラベル
    ctx.fillStyle="#333"; ctx.font="11px sans-serif";
    ctx.fillText(d.name, x0, y-17);
    ctx.textAlign="right"; ctx.fillStyle="#666"; ctx.font="bold 11px sans-serif";
    ctx.fillText(d.score, x0+w, y-17); ctx.textAlign="left";
  });
}

// ===== 描画 =====
drawCurrent(mkCard("案A 現行（8カテゴリ集約・8山谷）","sciences・化学科理想。比較用ベースライン",
  "8カテゴリの平均適合度を補間。<b>化学・応化・化工の僅差(.98/.96/.86)が「化」の山1つに潰れる</b>。"), sci.categoryStrengths, SCI_COLORS);

drawPerDept(mkCard("案B 細分化リング（学科ごと・約20〜32山谷）","mixed・化学科理想＝32学科を順に配置",
  "学科1つ=1本。色は8カテゴリ色のまま。<b>32個の山谷で「どの学科が高いか」まで一目で分かる</b>。本人提示の方向。"), mix, mkMixColors(), null, 8);

drawTacho(mkCard("案C タコメーター型（加速度計）","sciences・化学科理想。針=top1のカテゴリ方向",
  "車のタコメーター比喩。<b>第一印象のインパクト・「振り切った」感</b>が出る。反面、2位以下の情報量は最少。"), sci, SCI_COLORS);

drawParams(mkCard("案D パラメータ表示（ステータスバー）","sciences・化学科理想。上位8学科",
  "RPGステータス風の水平バー。<b>適合度の絶対値と差が最も正確に読める</b>。リングの「形の個性」は失われる。"), sci, SCI_COLORS);

function mkMixColors(){return ["#4A7BF7","#7B5CF5","#E05A9F","#EF5350","#F59B42","#F5D442","#4CAF50","#42C5D9"];}

document.getElementById("note").innerHTML =
  "全て判定式v2＋新3軸(PURE/BIO/PROC)の実出力。化学科の理想受験生プロファイルで描画。"+
  "案Bの色は mixed 版8カテゴリ色、ラベルは省略（実装時は8カテゴリ帯を残す）。";
</script>
</body>
</html>
